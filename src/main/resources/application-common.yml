# =====================================================================
# application-common.yml Ã¢â‚¬â€ Shared config, IDENTICAL across dev & prod
# =====================================================================
# Rule of thumb used to decide what lives here vs in dev/prod:
#   - Business logic, third-party API config, token economics, rate
#     limits, JWT/OTP expiries -> HERE (product behavior must not
#     silently change based on environment).
#   - Infra/runtime concerns (DB URL pooling values already differ per
#     env in practice via Neon branch, logging verbosity, show-sql,
#     ddl-auto, actuator detail level) -> stay in application-dev.yml /
#     application-prod.yml.
#
# Loaded via application.yml's `spring.config.import`. Values here are
# overridden by whichever profile file is active if the SAME key is
# redeclared there (profile-specific always wins over common).
# =====================================================================

# CUSTOM APP SETTINGS
# =========================================
app:

  # ---------------------------------------
  # FRONTEND URL
  # Used for:
  # - Email verification links
  # - Forgot/reset password links
  # - CORS default allowed origin
  # - OpenRouter referer
  # ---------------------------------------
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

    # ---------------------------------------
  # CORS
  # By default, same frontend-url allow hoga.
  # Agar future mein multiple origins chahiye, env se comma-separated de sakte ho:
  # CORS_ALLOWED_ORIGINS=https://app.domain.com,https://carerforge-frontend.pages.dev
  # ---------------------------------------
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:${app.frontend-url}}

  # ---------------------------------------
  # WALLET
  # ---------------------------------------
  wallet:
    initial-tokens: 100           # New user signup default token balance

  # ---------------------------------------
  # ADMIN USER Ã¢â‚¬â€ auto-created on first startup
  # ---------------------------------------
  default-admin:
    email: ${ADMIN_EMAIL}
    password: ${ADMIN_PASSWORD}
    mobile: ${ADMIN_MOBILE}
    name: ${ADMIN_NAME:Super Admin}

  # ---------------------------------------
  # MAIL SETTINGS
  # ---------------------------------------
  mail:
    from-name: TrackAI Security Team
    verification-expiry-minutes: 15
    resend-wait-minutes: 1

  # ---------------------------------------
  # JWT TOKENS
  # ---------------------------------------
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry: 15m
    refresh-token-expiry: 7d

  # ---------------------------------------
  # ADMIN SESSION
  # ---------------------------------------
  admin:
    access-token-expiry: 10m
    refresh-token-expiry: 1d
    absolute-session-expiry: 1d

  # ---------------------------------------
  # OTP SETTINGS
  # ---------------------------------------
  otp:
    expiry-minutes: 5
    resend-wait-minutes: 2

  forgot-password:
    otp-expiry-minutes: 5
    resend-wait-minutes: 2

  # ---------------------------------------
  # PAYMENT RECOVERY
  # Razorpay is queried after restarts for pending/failed local orders.
  # ---------------------------------------
  payment:
    refund-sla-days: ${PAYMENT_REFUND_SLA_DAYS:7}
    reconciliation:
      enabled: ${PAYMENT_RECONCILIATION_ENABLED:true}
      initial-delay-ms: ${PAYMENT_RECONCILIATION_INITIAL_DELAY_MS:30000}
      fixed-delay-ms: ${PAYMENT_RECONCILIATION_FIXED_DELAY_MS:120000}
      retry-after-seconds: ${PAYMENT_RECONCILIATION_RETRY_AFTER_SECONDS:120}
      lookback-days: ${PAYMENT_RECONCILIATION_LOOKBACK_DAYS:7}
      batch-size: ${PAYMENT_RECONCILIATION_BATCH_SIZE:25}
      max-attempts: ${PAYMENT_RECONCILIATION_MAX_ATTEMPTS:30}
  # ---------------------------------------
  # RATE LIMITING (Token Bucket per endpoint)
  # Format: capacity = max burst, refill = tokens/minute
  # ---------------------------------------
  rate-limit:

    # --- Auth Endpoints ---
    login:
      capacity: 5
      refill-tokens: 5
      refill-minutes: 1
    register:
      capacity: 5
      refill-tokens: 5
      refill-minutes: 1
    logout:
      capacity: 10
      refill-tokens: 10
      refill-minutes: 1
    refresh-token:
      capacity: 10
      refill-tokens: 10
      refill-minutes: 1

    # --- Email Verification ---
    resend-verification-email:
      capacity: 3
      refill-tokens: 3
      refill-minutes: 1
    verify-token:
      capacity: 5
      refill-tokens: 5
      refill-minutes: 1

    # --- Forgot Password Flow ---
    forgot-password:
      capacity: 5
      refill-tokens: 5
      refill-minutes: 1
    verify-forgot-password-otp:
      capacity: 5
      refill-tokens: 5
      refill-minutes: 1
    resend-forgot-password-otp:
      capacity: 3
      refill-tokens: 3
      refill-minutes: 1
    reset-password:
      capacity: 5
      refill-tokens: 5
      refill-minutes: 1

    # --- Admin Endpoints ---
    admin-login:
      capacity: 3
      refill-tokens: 3
      refill-minutes: 1
    verify-admin-otp:
      capacity: 5
      refill-tokens: 5
      refill-minutes: 1
    resend-admin-otp:
      capacity: 3
      refill-tokens: 3
      refill-minutes: 1

    # --- AI Features ---
    chat:
      capacity: 20
      refill-tokens: 20
      refill-minutes: 1
    image:
      capacity: 10
      refill-tokens: 10
      refill-minutes: 1
    resume:
      capacity: 8
      refill-tokens: 8
      refill-minutes: 1
    cover-letter:
      capacity: ${COVER_LETTER_RATE_CAPACITY:6}
      refill-tokens: ${COVER_LETTER_RATE_REFILL_TOKENS:6}
      refill-minutes: ${COVER_LETTER_RATE_REFILL_MINUTES:1}
    interview:
      capacity: ${INTERVIEW_RATE_CAPACITY:10}
      refill-tokens: ${INTERVIEW_RATE_REFILL_TOKENS:10}
      refill-minutes: ${INTERVIEW_RATE_REFILL_MINUTES:1}
    vision:
      capacity: 15
      refill-tokens: 15
      refill-minutes: 1
    pdf:
      capacity: 10
      refill-tokens: 10
      refill-minutes: 1
    website-generator:
      capacity: 5
      refill-tokens: 5
      refill-minutes: 1

    # --- Claims and external discovery ---
    promo-claim:
      capacity: 5
      refill-tokens: 5
      refill-minutes: 1
    job-search:
      capacity: 12
      refill-tokens: 12
      refill-minutes: 1
    support:
      capacity: ${SUPPORT_RATE_LIMIT_CAPACITY:10}
      refill-tokens: ${SUPPORT_RATE_LIMIT_REFILL_TOKENS:10}
      refill-minutes: ${SUPPORT_RATE_LIMIT_REFILL_MINUTES:1}

    # --- Payments ---
    create-order:
      capacity: 5
      refill-tokens: 5
      refill-minutes: 1
    verify-payment:
      capacity: 10
      refill-tokens: 10
      refill-minutes: 1
    payment-history:
      capacity: 50
      refill-tokens: 50
      refill-minutes: 1

    # --- Plans (Admin) ---
    create-plan:
      capacity: 10
      refill-tokens: 10
      refill-minutes: 1
    get-plans:
      capacity: 100
      refill-tokens: 100
      refill-minutes: 1
    update-plan:
      capacity: 10
      refill-tokens: 10
      refill-minutes: 1
    delete-plan:
      capacity: 5
      refill-tokens: 5
      refill-minutes: 1

  # ---------------------------------------
  # COOKIE SETTINGS Ã¢â‚¬â€ sab auth cookies (access, refresh, fingerprint)
  # yahi se control hoga, controller/util mein kahin bhi hardcode nahi
  #
  # Ã¢Å“â€¦ FIX Ã¢â‚¬â€ pehle ye block "app:" ke bahar, top-level "cookie:" ban gaya
  # tha (galat indentation ki wajah se) Ã¢â‚¬â€ isliye Spring ko property
  # "app.cookie.refresh-token-name" milti hi nahi thi, sirf
  # "cookie.refresh-token-name" milti thi -> app start hi nahi ho raha
  # tha (UnsatisfiedDependencyException on CookieUtil bean). Ab "app:"
  # ke andar, sahi 2-space indent ke saath.
  #
  # Ã¢Å“â€¦ FIX Ã¢â‚¬â€ path "/api/auth" se "/" kar diya. Access-token cookie sirf
  # login/refresh response mein set hoti hai, lekin usko READ har ek
  # protected request pe (JwtAuthenticationFilter jaisa filter, jo
  # /api/chat, /api/wallet, /api/users, etc. sab pe chalta hai) karna
  # padta hai. Cookie ka "path" attribute browser ko batata hai ki
  # cookie kis URL-prefix ke requests ke saath bhejni hai Ã¢â‚¬â€ agar
  # "/api/auth" rakhte to browser sirf /api/auth/** calls ke saath
  # cookie bhejta, baaki sab jagah (chat, wallet, user profile) cookie
  # missing milti aur wo saare authenticated calls 401 dete.
  # ---------------------------------------
  cookie:
    refresh-token-name: refreshToken
    access-token-name: accessToken
    fingerprint-name: fingerprint
    path: /
    same-site: ${COOKIE_SAME_SITE:Strict}
    secure: ${COOKIE_SECURE:true}


# =========================================
# OAUTH2 LOGIN - Google / GitHub
# =========================================
# Callback URLs to add in provider consoles:
# - Google: {BACKEND_URL}/login/oauth2/code/google
# - GitHub: {BACKEND_URL}/login/oauth2/code/github
# FRONTEND_URL must be only the app origin, for example http://localhost:5173
# or https://your-frontend-domain.com, not /login.
spring:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:CHANGE_ME_GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET:CHANGE_ME_GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
          github:
            client-id: ${GITHUB_CLIENT_ID:CHANGE_ME_GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET:CHANGE_ME_GITHUB_CLIENT_SECRET}
            scope:
              - read:user
              - user:email
        provider:
          google:
            user-name-attribute: sub
          github:
            user-name-attribute: id
# =========================================
# CLOUDINARY Ã¢â‚¬â€ Media Storage
# =========================================
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

# =========================================
# GROQ AI Ã¢â‚¬â€ LLM Inference (Multi-Model)
# =========================================
# Frontend model dropdown is populated from this list (/api/chat/models).
# Only models with vision: true should allow image attachments.
# Confirm available models in the Groq console before changing this list.
# =========================================
groq:
  api-key: ${GROQ_API_KEY}
  url: https://api.groq.com/openai/v1/chat/completions
  default-model: llama-3.3-70b-versatile
  max-tokens: 8192
  models:
    - id: llama-3.3-70b-versatile
      label: "Llama 3.3 70B"
      description: "Balanced model for general chat, coding help, and long-form answers"
      vision: false
    - id: llama-3.1-8b-instant
      label: "Llama 3.1 8B (Fast)"
      description: "Fast model for short questions and quick replies"
      vision: false
    - id: llama-3.2-90b-vision-preview
      label: "Llama 3.2 90B Vision"
      description: "Vision model for understanding photos, screenshots, and diagrams"
      vision: true
    - id: llama-3.2-11b-vision-preview
      label: "Llama 3.2 11B Vision (Fast)"
      description: "Fast vision model for lightweight image understanding tasks"
      vision: true
    - id: deepseek-r1-distill-llama-70b
      label: "DeepSeek R1 Distill 70B"
      description: "Deep reasoning model for step-by-step problem solving"
      vision: false
    - id: openai/gpt-oss-20b
      label: "GPT-OSS 20B"
      description: "Open-weight model for balanced general use"
      vision: false
    - id: openai/gpt-oss-120b
      label: "GPT-OSS 120B"
      description: "Larger open-weight model for more demanding tasks"
      vision: false

# =========================================
# OPENROUTER Ã¢â‚¬â€ Chat and Image Models
# =========================================
openrouter:
  api-key: ${OPENROUTER_API_KEY}
  base-url: https://openrouter.ai/api/v1
  chat-endpoint: /chat/completions
  chat-model: nvidia/nemotron-3-ultra-550b-a55b:free
  chat-models:
    - id: nvidia/nemotron-3-ultra-550b-a55b:free
      label: "OpenRouter - Nemotron 3 Ultra"
      description: "Free reasoning-focused text model for general chat and long-form answers."
      vision: false
      type: chat
    - id: cohere/north-mini-code:free
      label: "OpenRouter - North Mini Code"
      description: "Free coding-focused text model for programming, debugging, and technical help."
      vision: false
      type: chat
    - id: nvidia/nemotron-3.5-content-safety:free
      label: "OpenRouter - Nemotron Content Safety"
      description: "Free safety and moderation-oriented text/vision model for testing guardrail flows."
      vision: true
      type: chat
    - id: z-ai/glm-5.2
      label: "OpenRouter - GLM 5.2"
      description: "Long-context reasoning model for complex planning, coding, and agent-style tasks."
      vision: false
      type: chat
    - id: moonshotai/kimi-k2.7-code
      label: "OpenRouter - Kimi K2.7 Code"
      description: "Coding-focused model for end-to-end software tasks and repository-level help."
      vision: true
      type: chat
    - id: google/gemma-4-31b-it:free
      label: "OpenRouter - Gemma 4 31B IT"
      description: "Multi-model router that can deliberate across models for broad research-style prompts."
      vision: true
      type: chat
  image-endpoint: /images
  image-model: google/gemini-3.1-flash-lite-image
  image-models:
    - id: google/gemini-3.1-flash-lite-image
      label: "OpenRouter Image - Gemini 3.1 Flash Lite"
      description: "Fast, lower-cost image generation and lightweight image editing."
      vision: true
      type: image
    - id: google/gemini-3.1-flash-image
      label: "OpenRouter Image - Gemini 3.1 Flash"
      description: "Balanced image generation and editing with stronger visual quality."
      vision: true
      type: image
    - id: google/gemini-3-pro-image
      label: "OpenRouter Image - Gemini 3 Pro"
      description: "Advanced image generation and editing model for higher-quality visual outputs."
      vision: true
      type: image
  timeout: 120
  referer: ${FRONTEND_URL}
  title: TrackAI

# =========================================
# GEMINI RESUME AI
# Add GEMINI_API_KEY only in environment/secrets; never commit the key.
# =========================================
gemini:
  live:
    enabled: ${GEMINI_LIVE_ENABLED:true}
    model: ${GEMINI_LIVE_MODEL:gemini-3.1-flash-live-preview}
    voice: ${GEMINI_LIVE_VOICE:Kore}
    session-minutes: ${GEMINI_LIVE_SESSION_MINUTES:15}
  resume:
    api-key: ${GEMINI_API_KEY:CHANGE_ME_GEMINI_API_KEY}
    base-url: https://generativelanguage.googleapis.com
    # Every selectable model is configured here; Java contains no Gemini model IDs.
    # Override any ID from backend environment without rebuilding the application.
    model: ${GEMINI_RESUME_MODEL:gemini-2.5-flash}
    models:
      - id: ${GEMINI_RESUME_MODEL_FRONTIER:gemini-3.5-flash}
        label: "Gemini 3.5 Flash"
        description: "Frontier quality for detailed resume reasoning and rewriting"
        tier: FRONTIER
        preview: false
      - id: ${GEMINI_RESUME_MODEL_PRO_PREVIEW:gemini-3.1-pro-preview}
        label: "Gemini 3.1 Pro"
        description: "Deep analysis for complex senior and specialist resumes"
        tier: PRO
        preview: true
      - id: ${GEMINI_RESUME_MODEL_FAST_LITE:gemini-3.1-flash-lite}
        label: "Gemini 3.1 Flash-Lite"
        description: "Fast and economical analysis for quick resume checks"
        tier: FAST
        preview: false
      - id: ${GEMINI_RESUME_MODEL_BALANCED:gemini-2.5-flash}
        label: "Gemini 2.5 Flash"
        description: "Reliable balance of speed, quality and cost"
        tier: BALANCED
        preview: false
      - id: ${GEMINI_RESUME_MODEL_BUDGET:gemini-2.5-flash-lite}
        label: "Gemini 2.5 Flash-Lite"
        description: "Lowest-cost option for straightforward resumes"
        tier: ECONOMY
        preview: false
      - id: ${GEMINI_RESUME_MODEL_DEEP:gemini-2.5-pro}
        label: "Gemini 2.5 Pro"
        description: "Deep reasoning for nuanced career histories"
        tier: PRO
        preview: false
    timeout-seconds: 75
    max-file-bytes: 5242880
    max-resume-chars: 50000
    max-job-description-chars: 20000
    chat-history-messages: ${GEMINI_RESUME_CHAT_HISTORY_MESSAGES:100}
    chat-history-max-chars: ${GEMINI_RESUME_CHAT_HISTORY_MAX_CHARS:24000}
    chat-max-output-tokens: ${GEMINI_RESUME_CHAT_MAX_OUTPUT_TOKENS:8192}
    json-max-output-tokens: ${GEMINI_RESUME_JSON_MAX_OUTPUT_TOKENS:8192}

# =========================================
# LIVE JOB DISCOVERY (Adzuna)
# Create credentials at https://developer.adzuna.com and keep them in environment secrets.
# =========================================
jobs:
  provider:
    base-url: ${ADZUNA_BASE_URL:https://api.adzuna.com}
    app-id: ${ADZUNA_APP_ID:}
    app-key: ${ADZUNA_APP_KEY:}
    default-country: ${ADZUNA_DEFAULT_COUNTRY:in}
    results-per-page: ${ADZUNA_RESULTS_PER_PAGE:20}
    max-age-days: ${ADZUNA_MAX_AGE_DAYS:30}
    timeout-seconds: ${ADZUNA_TIMEOUT_SECONDS:20}
# =========================================
# RAZORPAY Ã¢â‚¬â€ Payment Gateway
# =========================================
razorpay:
  key-id: ${RAZORPAY_KEY_ID}
  key-secret: ${RAZORPAY_KEY_SECRET}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET}

# =========================================
# TOKEN COSTS PER FEATURE (TrackAI Wallet)
# =========================================
trackai:
  monitoring:
    max-events: ${MONITORING_MAX_EVENTS:1000}
    retention-hours: ${MONITORING_RETENTION_HOURS:24}
    # Enable only behind a trusted load balancer such as Elastic Beanstalk.
    trust-proxy-headers: ${MONITORING_TRUST_PROXY_HEADERS:true}
  tokens:
    chat: 10
    image: 200
    resume: ${TOKEN_COST_RESUME_LEGACY:100}
    resume-analysis: ${TOKEN_COST_RESUME_ANALYSIS:30}
    resume-chat: ${TOKEN_COST_RESUME_CHAT:5}
    resume-match: ${TOKEN_COST_RESUME_MATCH:20}
    resume-generate: ${TOKEN_COST_RESUME_GENERATE:40}
    cover-letter: ${TOKEN_COST_COVER_LETTER:25}
    interview-start: ${TOKEN_COST_INTERVIEW_START:10}
    interview-answer: ${TOKEN_COST_INTERVIEW_ANSWER:10}
    website: 500
    pdf: 50
    audio: 80