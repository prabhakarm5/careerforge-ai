# =========================================
# HUGGING FACE IMAGE GENERATION
# Free accounts receive limited credits; keep the token in environment only.
# =========================================
huggingface:
  image:
    enabled: ${HF_IMAGE_ENABLED:true}
    api-key: ${HF_TOKEN:}
    base-url: ${HF_IMAGE_BASE_URL:https://router.huggingface.co/fal-ai}
    # Legacy single-model values remain as a safe fallback for older deployments.
    model: ${HF_IMAGE_MODEL:black-forest-labs/FLUX.1-schnell}
    provider-model: ${HF_IMAGE_PROVIDER_MODEL:fal-ai/flux/schnell}
    label: ${HF_IMAGE_LABEL:FLUX.1 Schnell}
    description: ${HF_IMAGE_DESCRIPTION:Fast text-to-image generation through Hugging Face Inference Providers and Fal AI.}
    timeout-seconds: ${HF_IMAGE_TIMEOUT_SECONDS:120}
    poll-interval-millis: ${HF_IMAGE_POLL_INTERVAL_MS:500}
    max-download-bytes: ${HF_IMAGE_MAX_DOWNLOAD_BYTES:15728640}
    max-upload-bytes: ${HF_IMAGE_MAX_UPLOAD_BYTES:8388608}
    models:
      - id: ${HF_IMAGE_MODEL_FLUX_SCHNELL:black-forest-labs/FLUX.1-schnell}
        provider-model: ${HF_IMAGE_PROVIDER_FLUX_SCHNELL:fal-ai/flux/schnell}
        label: "FLUX.1 Schnell"
        description: "Fast, clean generation for everyday prompts and concept art."
        inference-steps: 4
        default-model: true
        supports-image-input: false
      - id: ${HF_IMAGE_MODEL_Z_IMAGE_TURBO:Tongyi-MAI/Z-Image-Turbo}
        provider-model: ${HF_IMAGE_PROVIDER_Z_IMAGE_TURBO:fal-ai/z-image/turbo}
        label: "Z-Image Turbo"
        description: "Fast photorealistic generation with strong prompt adherence."
        inference-steps: 8
        supports-image-input: false
      - id: ${HF_IMAGE_MODEL_SDXL:stabilityai/stable-diffusion-xl-base-1.0}
        provider-model: ${HF_IMAGE_PROVIDER_SDXL:fal-ai/fast-sdxl}
        label: "Stable Diffusion XL"
        description: "Versatile open image model for illustrations, products, and stylized visuals."
        inference-steps: 25
        supports-image-input: false
      - id: ${HF_IMAGE_MODEL_KREA_TURBO:krea/Krea-2-Turbo}
        provider-model: ${HF_IMAGE_PROVIDER_KREA_TURBO:fal-ai/krea-2/turbo}
        label: "Krea 2 Turbo"
        description: "Fast high-detail generation for polished creative assets."
        inference-steps: 8
        supports-image-input: false

      - id: ${HF_IMAGE_MODEL_FLUX_KONTEXT:black-forest-labs/FLUX.1-Kontext-dev}
        provider-model: ${HF_IMAGE_PROVIDER_FLUX_KONTEXT:fal-ai/flux-kontext/dev}
        label: "FLUX.1 Kontext Edit"
        description: "Edit, restyle, or transform an uploaded image with a natural-language prompt."
        inference-steps: 28
        supports-image-input: true
        requires-image-input: true
        image-input-field: image_url
# =========================================
# GEMINI RESUME AI
# Add GEMINI_API_KEY only in environment/secrets; never commit the key.
# =========================================
gemini:
  live:
    enabled: ${GEMINI_LIVE_ENABLED:true}
    model: ${GEMINI_LIVE_MODEL:gemini-3.1-flash-live-preview}
    voice: ${GEMINI_LIVE_VOICE:Kore}
    session-minutes: ${GEMINI_LIVE_SESSION_MINUTES:15}
  resume:
    api-key: ${GEMINI_API_KEY:CHANGE_ME_GEMINI_API_KEY}
    base-url: https://generativelanguage.googleapis.com
    # Every selectable model is configured here; Java contains no Gemini model IDs.
    # Override any ID from backend environment without rebuilding the application.
    model: ${GEMINI_RESUME_MODEL:gemini-2.5-flash}
    models:
      - id: ${GEMINI_RESUME_MODEL_FRONTIER:gemini-3.5-flash}
        label: "Gemini 3.5 Flash"
        description: "Frontier quality for detailed resume reasoning and rewriting"
        tier: FRONTIER
        preview: false
      - id: ${GEMINI_RESUME_MODEL_PRO_PREVIEW:gemini-3.1-pro-preview}
        label: "Gemini 3.1 Pro"
        description: "Deep analysis for complex senior and specialist resumes"
        tier: PRO
        preview: true
      - id: ${GEMINI_RESUME_MODEL_FAST_LITE:gemini-3.1-flash-lite}
        label: "Gemini 3.1 Flash-Lite"
        description: "Fast and economical analysis for quick resume checks"
        tier: FAST
        preview: false
      - id: ${GEMINI_RESUME_MODEL_BALANCED:gemini-2.5-flash}
        label: "Gemini 2.5 Flash"
        description: "Reliable balance of speed, quality and cost"
        tier: BALANCED
        preview: false
      - id: ${GEMINI_RESUME_MODEL_BUDGET:gemini-2.5-flash-lite}
        label: "Gemini 2.5 Flash-Lite"
        description: "Lowest-cost option for straightforward resumes"
        tier: ECONOMY
        preview: false
      - id: ${GEMINI_RESUME_MODEL_DEEP:gemini-2.5-pro}
        label: "Gemini 2.5 Pro"
        description: "Deep reasoning for nuanced career histories"
        tier: PRO
        preview: false
    timeout-seconds: 75
    max-file-bytes: 5242880
    max-resume-chars: 50000
    max-job-description-chars: 20000
    chat-history-messages: ${GEMINI_RESUME_CHAT_HISTORY_MESSAGES:100}
    chat-history-max-chars: ${GEMINI_RESUME_CHAT_HISTORY_MAX_CHARS:24000}
    chat-max-output-tokens: ${GEMINI_RESUME_CHAT_MAX_OUTPUT_TOKENS:8192}
    json-max-output-tokens: ${GEMINI_RESUME_JSON_MAX_OUTPUT_TOKENS:8192}

