# =====================================================================
# application-prod.yml — PROD profile ONLY

# =====================================================================
# Everything shared with prod (Cloudinary, Groq, OpenRouter, Razorpay,
# JWT/OTP expiry, rate-limits, token costs) now lives in
# application-common.yml. This file only holds things that genuinely
# differ locally: DB pool, SQL echo, actuator verbosity, dev-only tools
# (ngrok), and logging.
# =====================================================================

server:
  port: ${SERVER_PORT:9092}
  shutdown: graceful
  forward-headers-strategy: framework
  compression:
    enabled: true
    min-response-size: 1024
    mime-types:
      - application/json
      - text/html
      - text/plain

# CloudFront and Elastic Beanstalk use different origins. Cross-site refresh
# cookies must be explicitly marked None + Secure or browsers omit them.
app:
  cookie:
    same-site: ${COOKIE_SAME_SITE:None}
    secure: ${COOKIE_SECURE:true}
spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:10000}
      # Keep the web process alive during a temporary database outage. Requests
      # that require the database still fail normally, but AWS can restart or
      # diagnose the application instead of losing the whole container.
      initialization-fail-timeout: -1
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:1800000}
      keepalive-time: ${DB_KEEPALIVE_TIME_MS:300000}
      validation-timeout: 5000

  jpa:
    open-in-view: false
    hibernate:
      # Production deployments must not mutate the schema during startup.
      # Schema changes should be applied as explicit migrations.
      ddl-auto: none
    # FIX: false kar diya — ab console mein Hibernate ki generated SQL
    # print nahi hogi. Isse cache HIT/MISS wale log lines saaf dikhenge,
    # aur agar DB query chali (cache MISS ki wajah se) to woh SQL clutter
    # ki wajah se dab nahi jaayegi — tumhe seedha pata chal jaayega ki
    # cache kaam kar raha hai ya DB hi hit ho raha hai har baar.
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  thymeleaf:
    check-template-location: false

  web:
    resources:
      add-mappings: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 8MB
      max-request-size: 10MB

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  data:
    redis:
      host: ${UPSTASH_REDIS_HOST}
      port: ${UPSTASH_REDIS_PORT}
      password: ${UPSTASH_REDIS_TOKEN}
      ssl:
        enabled: true
      timeout: 5s

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      # This endpoint is public for AWS health checks, so never expose dependency
      # details or connection metadata.
      show-details: never
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState,ping
        readiness:
          include: readinessState,ping
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
    # External dependency checks can take 15+ seconds and must not make AWS
    # believe the JVM/container itself is dead.
    redis:
      enabled: false
    db:
      enabled: false

# =========================================
# NGROK — Local Tunneling (DEV ONLY)
# =========================================
# Exposes localhost so Razorpay's webhook can reach your machine while
# testing locally. No purpose in prod — not in application-prod.yml.
ngrok:
  authtoken: ${NGROK_AUTH_TOKEN}

# =========================================
# LOGGING — Verbose, for local debugging
# =========================================
logging:
  level:
    root: INFO
    com.trackai: DEBUG
    org.springframework: INFO
    # FIX: Hibernate SQL logger ko bhi INFO kar diya (DEBUG se) — chahe
    # show-sql upar false hai, ye logger kabhi kabhi Hibernate internals
    # se bhi print ho sakta hai. Ab dono jagah se SQL noise band.
    org.hibernate.SQL: INFO
  file:
    name: logs/trackai.log
    # FIX: previously written as a broken nested block ("file:" then a
    # second unindented "name:" under logging.level) — that is invalid
    # YAML structure and either fails to parse or silently keeps only
    # the last value. "logging.file.name" must be its own sibling key
    # under "logging", exactly as above.