# =====================================================================
# application.yml — Profile Selector ONLY
# =====================================================================
# This file must stay minimal. Its only job is deciding which profile
# (dev / prod) gets activated. All real configuration lives in
# application-dev.yml or application-prod.yml — never add feature
# config directly here, or it will silently apply to BOTH profiles.
# =====================================================================

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE}
    # No env var set on your machine        -> "dev" runs (safe local default)
    # SPRING_PROFILES_ACTIVE=prod on Elastic Beanstalk -> "prod" runs

  config:
    import:
      - classpath:application-common.yml
      # Loaded before the active profile file below, so dev/prod values
      # for the SAME key (if any) still win — common is the fallback.