# =====================================================================
# APPLICATION CONFIGURATION — CareerForge AI (TrackAI Backend)
# =====================================================================
# NOTE: Sensitive values are injected from .env
#       Never hardcode secrets, passwords, or keys
# =====================================================================

# =========================================
# SERVER
# =========================================
server:
  port: ${SERVER_PORT:9092}

# =========================================
# SPRING BOOT CORE
# =========================================
spring:

  # ---------------------------------------
  # DATABASE — MySQL (HikariCP Pool)
  # ---------------------------------------
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20       # Max concurrent DB connections
      minimum-idle: 5             # Minimum idle connections
      connection-timeout: 30000   # 30s connection timeout
      idle-timeout: 600000        # 10 min — idle connection recycle
      max-lifetime: 1800000       # 30 min — connection max age

  # ---------------------------------------
  # JPA / HIBERNATE
  # ---------------------------------------
  jpa:
    hibernate:
      ddl-auto: update         # Development schema update mode
    show-sql: false               # Production mein SQL log off
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect

  # ---------------------------------------
  # FILE UPLOAD LIMITS
  # ---------------------------------------
  servlet:
    multipart:
      enabled: true
      max-file-size: 8MB          # Single file max size (image uploads ke liye bada rakha)
      max-request-size: 10MB      # Total request max size (file + metadata)

  # ---------------------------------------
  # EMAIL — SMTP (Gmail)
  # ---------------------------------------
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # ---------------------------------------
  # REDIS — Token/OTP/Session Cache (Upstash)
  # ---------------------------------------
  data:
    redis:
      host: ${UPSTASH_REDIS_HOST}
      port: ${UPSTASH_REDIS_PORT}
      password: ${UPSTASH_REDIS_TOKEN}
      ssl:
        enabled: true

# =========================================
# SPRING ACTUATOR — Hardened for Production
# =========================================
management:
  endpoints:
    web:
      exposure:
        include: health           # Expose health only
  endpoint:
    health:
      show-details: never         # Hide internal health details

# =========================================
# CUSTOM APP SETTINGS
# =========================================
app:

  frontend-url: ${FRONTEND_URL}

  # ---------------------------------------
  # WALLET
  # ---------------------------------------
  wallet:
    initial-tokens: 100           # New user signup pe default token balance

  # ---------------------------------------
  # MAIL SETTINGS
  # ---------------------------------------
  mail:
    from-name: TrackAI Security Team
    verification-expiry-minutes: 15
    resend-wait-minutes: 1

  # ---------------------------------------
  # JWT TOKENS
  # ---------------------------------------
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry: 15m
    refresh-token-expiry: 7d

  # ---------------------------------------
  # ADMIN SESSION
  # ---------------------------------------
  admin:
    access-token-expiry: 10m
    refresh-token-expiry: 1d
    absolute-session-expiry: 1d

  # ---------------------------------------
  # OTP SETTINGS
  # ---------------------------------------
  otp:
    expiry-minutes: 5
    resend-wait-minutes: 2

  forgot-password:
    otp-expiry-minutes: 5
    resend-wait-minutes: 2

  # ---------------------------------------
  # RATE LIMITING (Token Bucket per endpoint)
  # Format: capacity = max burst, refill = tokens/minute
  # ---------------------------------------
  rate-limit:

    # --- Auth Endpoints ---
    login:
      capacity: 5
      refill-tokens: 5
      refill-minutes: 1

    register:
      capacity: 5
      refill-tokens: 5
      refill-minutes: 1

    logout:
      capacity: 10
      refill-tokens: 10
      refill-minutes: 1

    refresh-token:
      capacity: 10
      refill-tokens: 10
      refill-minutes: 1

    # --- Email Verification ---
    resend-verification-email:
      capacity: 3
      refill-tokens: 3
      refill-minutes: 1

    verify-token:
      capacity: 5
      refill-tokens: 5
      refill-minutes: 1

    # --- Forgot Password Flow ---
    forgot-password:
      capacity: 5
      refill-tokens: 5
      refill-minutes: 1

    verify-forgot-password-otp:
      capacity: 5
      refill-tokens: 5
      refill-minutes: 1

    resend-forgot-password-otp:
      capacity: 3
      refill-tokens: 3
      refill-minutes: 1

    reset-password:
      capacity: 5
      refill-tokens: 5
      refill-minutes: 1

    # --- Admin Endpoints ---
    admin-login:
      capacity: 3
      refill-tokens: 3
      refill-minutes: 1

    verify-admin-otp:
      capacity: 5
      refill-tokens: 5
      refill-minutes: 1

    resend-admin-otp:
      capacity: 3
      refill-tokens: 3
      refill-minutes: 1

    # --- AI Features ---
    chat:
      capacity: 20
      refill-tokens: 20
      refill-minutes: 1

    image:
      capacity: 10
      refill-tokens: 10
      refill-minutes: 1

    vision:
      capacity: 15
      refill-tokens: 15
      refill-minutes: 1

    pdf:
      capacity: 10
      refill-tokens: 10
      refill-minutes: 1

    website-generator:
      capacity: 5
      refill-tokens: 5
      refill-minutes: 1

    # --- Payments ---
    create-order:
      capacity: 5
      refill-tokens: 5
      refill-minutes: 1

    verify-payment:
      capacity: 10
      refill-tokens: 10
      refill-minutes: 1

    payment-history:
      capacity: 50
      refill-tokens: 50
      refill-minutes: 1

    # --- Plans (Admin) ---
    create-plan:
      capacity: 10
      refill-tokens: 10
      refill-minutes: 1

    get-plans:
      capacity: 100
      refill-tokens: 100
      refill-minutes: 1

    update-plan:
      capacity: 10
      refill-tokens: 10
      refill-minutes: 1

    delete-plan:
      capacity: 5
      refill-tokens: 5
      refill-minutes: 1

# =========================================
# CLOUDINARY — Media Storage
# =========================================
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

# =========================================
# GROQ AI — LLM Inference (Multi-Model)
# =========================================
# The frontend model dropdown is populated from this list (/api/chat/models).
# The "id" value must match the provider model id. Only models with vision: true
# should allow image attachments; all other models should disable the image button.

#
# NOTE: Keep these ids aligned with the currently enabled Groq models.
# Confirm available models in the Groq console before changing them.
# kar lena ki tumhare account me kaunse models enabled hain, phir
# list ko usi hisaab se adjust kar lena.
# =========================================
groq:
  api-key: ${GROQ_API_KEY}
  url: https://api.groq.com/openai/v1/chat/completions
  default-model: llama-3.3-70b-versatile
  # Maximum generated tokens per response.
  # If this is too small, long answers can stop early with finish_reason: length.
  
  max-tokens: 8192
  models:
    - id: llama-3.3-70b-versatile
      label: "Llama 3.3 70B"
      description: "Balanced model for general chat, coding help, and long-form answers"
      vision: false
    - id: llama-3.1-8b-instant
      label: "Llama 3.1 8B (Fast)"
      description: "Fast model for short questions and quick replies"
      vision: false
    - id: llama-3.2-90b-vision-preview
      label: "Llama 3.2 90B Vision"
      description: "Vision model for understanding photos, screenshots, and diagrams"
      vision: true
    - id: llama-3.2-11b-vision-preview
      label: "Llama 3.2 11B Vision (Fast)"
      description: "Fast vision model for lightweight image understanding tasks"
      vision: true
    - id: deepseek-r1-distill-llama-70b
      label: "DeepSeek R1 Distill 70B"
      description: "Deep reasoning model for step-by-step problem solving"
      vision: false
    - id: openai/gpt-oss-20b
      label: "GPT-OSS 20B"
      description: "Open-weight model for balanced general use"
      vision: false
    - id: openai/gpt-oss-120b
      label: "GPT-OSS 120B"
      description: "Larger open-weight model for more demanding tasks"
      vision: false

# =========================================
# OPENROUTER - Chat and Image Models
# =========================================
openrouter:
  api-key: ${OPENROUTER_API_KEY}
  base-url: https://openrouter.ai/api/v1
  chat-endpoint: /chat/completions
  chat-model: nvidia/nemotron-3-ultra-550b-a55b:free
  chat-models:
    - id: nvidia/nemotron-3-ultra-550b-a55b:free
      label: "OpenRouter - Nemotron 3 Ultra"
      description: "Free reasoning-focused text model for general chat and long-form answers."
      vision: false
      type: chat
    - id: cohere/north-mini-code:free
      label: "OpenRouter - North Mini Code"
      description: "Free coding-focused text model for programming, debugging, and technical help."
      vision: false
      type: chat
    - id: nvidia/nemotron-3.5-content-safety:free
      label: "OpenRouter - Nemotron Content Safety"
      description: "Free safety and moderation-oriented text/vision model for testing guardrail flows."
      vision: true
      type: chat
    - id: z-ai/glm-5.2
      label: "OpenRouter - GLM 5.2"
      description: "Long-context reasoning model for complex planning, coding, and agent-style tasks."
      vision: false
      type: chat
    - id: moonshotai/kimi-k2.7-code
      label: "OpenRouter - Kimi K2.7 Code"
      description: "Coding-focused model for end-to-end software tasks and repository-level help."
      vision: true
      type: chat
    - id: google/gemma-4-31b-it:free
      label: " OpenRouter - Gemma 4 31B IT"
      description: "Multi-model router that can deliberate across models for broad research-style prompts."
      vision: true
      type: chat
  image-endpoint: /images
  image-model: google/gemini-3.1-flash-lite-image
  image-models:
    - id: google/gemini-3.1-flash-lite-image
      label: "OpenRouter Image - Gemini 3.1 Flash Lite"
      description: "Fast, lower-cost image generation and lightweight image editing."
      vision: true
      type: image
    - id: google/gemini-3.1-flash-image
      label: "OpenRouter Image - Gemini 3.1 Flash"
      description: "Balanced image generation and editing with stronger visual quality."
      vision: true
      type: image
    - id: google/gemini-3-pro-image
      label: "OpenRouter Image - Gemini 3 Pro"
      description: "Advanced image generation and editing model for higher-quality visual outputs."
      vision: true
      type: image
  timeout: 120
  referer: ${FRONTEND_URL}
  title: TrackAI

# =========================================
# RAZORPAY — Payment Gateway
# =========================================
razorpay:
  key-id: ${RAZORPAY_KEY_ID}
  key-secret: ${RAZORPAY_KEY_SECRET}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET}  # Fake payment attacks se protection

# =========================================
# NGROK — Local Tunneling (Dev only)
# =========================================
ngrok:
  authtoken: ${NGROK_AUTH_TOKEN}

# =========================================
# TOKEN COSTS PER FEATURE (TrackAI Wallet)
# =========================================
trackai:
  tokens:
    chat: 10
    image: 200
    resume: 100
    website: 500
    pdf: 50
    audio: 80