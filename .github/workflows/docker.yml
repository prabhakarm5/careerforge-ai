name: Build Push Deploy

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DOCKER_IMAGE: prabhakar7277/trackai-backend

jobs:
  docker-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Sync encrypted production environment
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-south-1
          CAREERFORGE_SECRET_ARN: ${{ vars.CAREERFORGE_SECRET_ARN }}
          CAREERFORGE_PROD_ENV_JSON: ${{ secrets.CAREERFORGE_PROD_ENV_JSON }}
        run: |
          test -n "$CAREERFORGE_PROD_ENV_JSON" || { echo "CAREERFORGE_PROD_ENV_JSON repository secret is missing"; exit 1; }
          CURRENT_ENV_JSON="$(aws secretsmanager get-secret-value \
            --secret-id "$CAREERFORGE_SECRET_ARN" \
            --query SecretString \
            --output text 2>/dev/null || true)"
          if [ "$CURRENT_ENV_JSON" = "$CAREERFORGE_PROD_ENV_JSON" ]; then
            echo "AWS production environment is already current"
          else
            aws secretsmanager put-secret-value \
              --secret-id "$CAREERFORGE_SECRET_ARN" \
              --secret-string "$CAREERFORGE_PROD_ENV_JSON" \
              > /dev/null
            echo "Production environment synchronized with AWS Secrets Manager"
          fi
          unset CURRENT_ENV_JSON

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
            -t $DOCKER_IMAGE:${{ github.sha }} \
            -t $DOCKER_IMAGE:latest \
            .

      - name: Push Docker Image
        run: |
          docker push $DOCKER_IMAGE:${{ github.sha }}
          docker push $DOCKER_IMAGE:latest

      - name: Create Elastic Beanstalk Bundle
        env:
          CAREERFORGE_SECRET_ARN: ${{ vars.CAREERFORGE_SECRET_ARN }}
        run: |
          test -n "$CAREERFORGE_SECRET_ARN" || { echo "CAREERFORGE_SECRET_ARN repository variable is missing"; exit 1; }
          mkdir -p deploy/.ebextensions

          cat > deploy/Dockerrun.aws.json << EOF
          {
            "AWSEBDockerrunVersion": "1",
            "Image": {
              "Name": "$DOCKER_IMAGE:${{ github.sha }}",
              "Update": "true"
            },
            "Ports": [
              {
                "ContainerPort": "5000"
              }
            ]
          }
          EOF

          cat > deploy/.ebextensions/launch-template.config << EOF
          option_settings:
            aws:autoscaling:launchconfiguration:
              RootVolumeType: gp3
              DisableIMDSv1: true
          EOF

          cat > deploy/.ebextensions/environment-secrets.config << EOF
          option_settings:
            aws:elasticbeanstalk:application:environment:
              SPRING_PROFILES_ACTIVE: prod
            aws:elasticbeanstalk:application:environmentsecrets:
              CAREERFORGE_PROD_ENV_JSON: ${CAREERFORGE_SECRET_ARN}
          EOF

          cd deploy
          zip -r ../careerforge-deploy.zip Dockerrun.aws.json .ebextensions

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: careerforge-ai
          environment_name: careerforge-ai-env
          version_label: careerforge-${{ github.sha }}-${{ github.run_number }}
          use_existing_version_if_available: true
          region: ap-south-1
          deployment_package: careerforge-deploy.zip