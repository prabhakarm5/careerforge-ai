name: Build Push Deploy

on:
  push:
    branches:
      - main

jobs:
  docker-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker Image
        run: docker build -t prabhakar7277/trackai-backend:latest .

      - name: Push Docker Image
        run: docker push prabhakar7277/trackai-backend:latest

      - name: Create Elastic Beanstalk Bundle
        run: |
          mkdir deploy
          cat > deploy/Dockerrun.aws.json << 'EOF'
          {
            "AWSEBDockerrunVersion": "1",
            "Image": {
              "Name": "prabhakar7277/trackai-backend:latest",
              "Update": "true"
            },
            "Ports": [
              {
                "ContainerPort": "5000"
              }
            ]
          }
          EOF
          cd deploy
          zip -r ../careerforge-deploy.zip Dockerrun.aws.json

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: careerforge-ai
          environment_name: careerforge-ai-env
          version_label: careerforge-${{ github.sha }}
          region: ap-south-1
          deployment_package: careerforge-deploy.zip